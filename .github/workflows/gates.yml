name: gates

on:
  pull_request:
  push:
    branches: [main]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Manifests valid
        run: |
          jq -e '.name == "tokenomics"' .claude-plugin/plugin.json
          jq -e '.plugins[0].source == "./"' .claude-plugin/marketplace.json

      - name: Skill frontmatter matches directories
        run: |
          for f in skills/*/SKILL.md; do
            d=$(basename "$(dirname "$f")")
            head -1 "$f" | grep -qx -- '---' || { echo "no frontmatter fence: $f"; exit 1; }
            grep -qx "name: $d" "$f" || { echo "frontmatter name != directory: $f"; exit 1; }
          done

      - name: Skill frontmatter is valid YAML
        run: |
          python3 -c "import yaml" 2>/dev/null || python3 -m pip install --quiet --break-system-packages pyyaml
          python3 - <<'PY'
          import glob, re, sys, yaml
          bad = 0
          for f in sorted(glob.glob("skills/*/SKILL.md")):
              txt = open(f, encoding="utf-8").read()
              m = re.match(r"^---\n(.*?)\n---\n", txt, re.S)
              if not m:
                  print(f + ": no YAML frontmatter block"); bad = 1; continue
              try:
                  data = yaml.safe_load(m.group(1))
              except Exception as e:
                  print(f + ": frontmatter is not valid YAML: " + str(e)); bad = 1; continue
              if not isinstance(data, dict):
                  print(f + ": frontmatter is not a mapping"); bad = 1; continue
              for key in ("name", "description"):
                  v = data.get(key)
                  if not isinstance(v, str) or not v.strip():
                      print(f + ": missing or empty " + key); bad = 1
          print("skill frontmatter: all valid" if not bad else "skill frontmatter: FAILED")
          sys.exit(bad)
          PY

      - name: Relative links resolve
        run: |
          fail=0
          for f in $(git ls-files '*.md'); do
            dir=$(dirname "$f")
            for l in $(grep -oE '\]\([^) ]+\)' "$f" | sed -E 's/\]\((.+)\)/\1/'); do
              case "$l" in http://*|https://*|mailto:*|\#*) continue ;; esac
              t="${l%%#*}"
              [ -z "$t" ] && continue
              if [ ! -e "$dir/$t" ]; then echo "BROKEN: $f -> $l"; fail=1; fi
            done
          done
          exit "$fail"

      - name: Privacy sweep (source project stays unnamed)
        run: |
          ! grep -rniE 'veska|gdelt|astronom|/Users/' --include='*.md' .

      - name: Concrete model names only in the method doc's mapping
        run: |
          hits=$(grep -rlE 'Fable|Opus|Sonnet|Haiku' --include='*.md' . | grep -vx './reference/portable-method.md' || true)
          if [ -n "$hits" ]; then
            echo "Concrete model names outside portable-method.md:"
            echo "$hits"
            exit 1
          fi
